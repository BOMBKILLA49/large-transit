<!-- Contact Section Start - Google Powered Quote Form -->
<section class="contact-section section-padding pb-0 fix bg-cover" style="background-image: url('assets/img/home-1/contact/contact-bg.jpg');">
    <div class="container">
        <div class="contact-wrapper">
            <div class="row justify-content-center">
                <div class="col-lg-11 col-xl-9">
                    <div class="contact-box-items bg-cover" style="background-image: url('assets/img/home-1/contact-bg.jpg'); padding: 70px 50px;">
                        <div class="arrow-image">
                            <img src="assets/img/home-1/contact/arrow.png" alt="">
                        </div>
                        <h3 class="text-center mb-5">Request For a Free Quote</h3>
                        
                        <form action="#" class="contact-form-items" id="quote-form">
                            <div class="row g-4">
                                <!-- From (Google Autocomplete) -->
                                <div class="col-lg-6 wow fadeInUp" data-wow-delay=".3s">
                                    <div class="form-clt ralt">
                                        <input type="text" id="from-location" placeholder="From (Pickup City, State or Zip)" required>
                                        <small class="text-muted">Start typing city or address...</small>
                                    </div>
                                </div>
                                
                                <!-- To (Google Autocomplete) -->
                                <div class="col-lg-6 wow fadeInUp" data-wow-delay=".4s">
                                    <div class="form-clt">
                                        <input type="text" id="to-location" placeholder="To (Delivery City, State or Zip)" required>
                                        <small class="text-muted">Start typing city or address...</small>
                                    </div>
                                </div>
                                
                                <!-- Freight Description -->
                                <div class="col-lg-12 wow fadeInUp" data-wow-delay=".5s">
                                    <div class="form-clt">
                                        <select class="form-control" id="freight-type" required>
                                            <option value="">Freight Description / Type *</option>
                                            <option value="Heavy Equipment">Heavy Equipment / Machinery</option>
                                            <option value="Oversize Load">Oversize Load</option>
                                            <option value="Full Truckload">Full Truckload (FTL)</option>
                                            <option value="Pallets">Pallets / General Freight</option>
                                            <option value="Vehicles">Vehicles / Auto Transport</option>
                                            <option value="Temperature Controlled">Temperature Controlled</option>
                                            <option value="Construction Materials">Construction Materials</option>
                                            <option value="Other">Other (describe below)</option>
                                        </select>
                                    </div>
                                </div>
                                
                                <!-- Shipping Frequency -->
                                <div class="col-lg-6 wow fadeInUp" data-wow-delay=".6s">
                                    <div class="form-clt">
                                        <select class="form-control" id="frequency" required>
                                            <option value="">Shipping Frequency *</option>
                                            <option value="One-time">One-time Shipment</option>
                                            <option value="Weekly">Weekly</option>
                                            <option value="Bi-weekly">Bi-weekly</option>
                                            <option value="Monthly">Monthly</option>
                                            <option value="As needed">As needed / On-demand</option>
                                        </select>
                                    </div>
                                </div>
                                
                                <!-- Name -->
                                <div class="col-lg-6 wow fadeInUp" data-wow-delay=".7s">
                                    <div class="form-clt">
                                        <input type="text" id="name" placeholder="Your Name" required>
                                    </div>
                                </div>
                                
                                <!-- Phone -->
                                <div class="col-lg-6 wow fadeInUp" data-wow-delay=".8s">
                                    <div class="form-clt">
                                        <input type="tel" id="phone" placeholder="Phone Number" required>
                                    </div>
                                </div>
                                
                                <!-- Email -->
                                <div class="col-lg-6 wow fadeInUp" data-wow-delay=".9s">
                                    <div class="form-clt">
                                        <input type="email" id="email" placeholder="Email Address" required>
                                    </div>
                                </div>
                                
                                <!-- Preferred Shipping Date -->
                                <div class="col-lg-12 wow fadeInUp" data-wow-delay="1s">
                                    <div class="form-clt">
                                        <input type="date" id="preferred-date" placeholder="Preferred Shipping Date">
                                    </div>
                                </div>
                                
                                <!-- Additional Details -->
                                <div class="col-lg-12 wow fadeInUp" data-wow-delay="1.1s">
                                    <div class="form-clt">
                                        <textarea id="message" rows="4" placeholder="Equipment details, dimensions, weight, special requirements, or exact address if needed..."></textarea>
                                    </div>
                                </div>
                                
                                <!-- Submit -->
                                <div class="col-lg-12 wow fadeInUp" data-wow-delay="1.2s">
                                    <div class="main-button mt-0">
                                        <button type="submit">
                                            <span class="theme-btn">GET FREE QUOTE</span>
                                            <span class="arrow-btn"><i class="fa-regular fa-arrow-up-right"></i></span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
